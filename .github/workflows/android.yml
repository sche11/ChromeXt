name: Android CI

# 提前适配Node.js 24，解决官方弃用警告，2026年6月后仍可正常运行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    # 固定稳定镜像，和你的运行环境完全匹配，避免latest版本波动带来的兼容性问题
    runs-on: ubuntu-24.04

    steps:
    # 1. 检出代码：替换为官方稳定版v4，兼容Node.js 24，避免开发版@main的不稳定性
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # 2. 配置JDK：替换为官方稳定版v4，兼容Node.js 24
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle # 新增gradle缓存，大幅提升构建速度

    # 3. 构建Debug APK：保留原有逻辑，新增权限修复
    - name: Build debug APK
      run: |
        chmod +x gradlew # 新增：修复gradlew执行权限不足的潜在问题
        ./gradlew app:assembleDebug
        
    # 4. 重命名APK：保留原有逻辑
    - name: Rename debug build
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/ChromeXt_debug.apk

    # 5. 上传APK到Actions制品：替换为官方稳定版v4，兼容Node.js 24，修复旧版本弃用问题
    - name: Upload debug build
      uses: actions/upload-artifact@v4
      with:
        name: ChromeXt_debug.apk
        path: app/build/ChromeXt_debug.apk
        if-no-files-found: error # 新增：构建失败无APK时直接报错，避免无效执行
        compression-level: 6

    # 6. 创建Release并自动上传APK：核心修复，彻底解决Tag重名问题
    # 替换已废弃的actions/create-release@v1 + upload-release-asset@v1，改用社区维护的稳定版，兼容Node.js 24
    - name: Create Release & Upload APK
      # 保留你原有的触发逻辑：PR不创建，仅push到master或推送Tag时创建
      if: ${{ ( github.event_name != 'pull_request' && github.ref == 'refs/heads/master' ) || github.ref_type == 'tag' }}
      uses: softprops/action-gh-release@v2
      with:
        # 核心修复：分场景生成Tag名，彻底避免和master分支重名
        # 场景1：推送Tag触发 → 直接用Tag名创建正式Release
        # 场景2：push到master触发 → 生成唯一Tag名，绝对不会和master分支冲突
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('ci-build-{0}-{1}', github.run_number, github.sha) }}
        # Release名称同步适配两种场景
        release_name: ${{ github.ref_type == 'tag' && github.ref_name || format('CI自动构建 - 第{0}次构建', github.run_number) }}
        # Release内容自动填充构建信息，可追溯
        body: |
          ## ChromeXt Debug 构建包
          - 触发方式：${{ github.ref_type == 'tag' && '正式Tag发布' || 'master分支自动构建' }}
          - 构建编号：${{ github.run_number }}
          - 提交哈希：${{ github.sha }}
          - 构建时间：${{ github.run_created_at }}
        # 自动上传APK到Release附件，一步完成，无需单独的上传步骤
        files: app/build/ChromeXt_debug.apk
        # 自动构建设为预发布，Tag发布设为正式发布，避免混淆
        prerelease: ${{ github.ref_type != 'tag' }}
        # 自动更新已存在的Tag（仅Tag发布时生效，避免重复Tag报错）
        update_existing: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
